<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Navbar</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
      }
      .navbar{
        background: #2c3e50;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
      }
      .logo{
        font-size: 20px;
        font-weight: bold;
      }
      .nav-links{
        display: flex;
        gap: 20px;
      }
      .nav-links a{
        color: white;
        text-decoration: none;
        transition: 0.3s;
      }
      .nav-links a:hover{
        color: #3498db;
      }
      .hamburger{
        display: none;
        flex-direction: column;
        cursor: pointer;
      }
      .hamburger div{
        width: 25px;
        height: 3px;
        background: white;
        margin: 4px 0;
        transition: 0.3s;
      }
      @media (max-width: 768px) {

    .nav-links {
        position: absolute;
        top: 60px;
        right: 0;
        background: #34495e;
        flex-direction: column;
        width: 200px;
        display: none;
        padding: 15px;
    }

    .nav-links.active {
        display: flex;
    }

    .hamburger {
        display: flex;
    }
}
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">MyWebsite</div>
      <div class="nav-links" id="navLinks">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </div>
      <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
      </div>
    </nav>

    <script>
        const hamburger = document.getElementById("hamburger");
        const navLinks = document.getElementById("navLinks");

        hamburger.addEventListener("click", ()=>{
            navLinks.classList.toggle("active")
        })
    </script>
  </body>
</html>
